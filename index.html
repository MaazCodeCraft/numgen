<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Number Pattern Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Number Pattern Generator</h1>
  <p class="subtitle">Generates a structured number pattern based on your input</p>

  <div class="input-area">
    <input type="number" id="numInput" placeholder="Enter a number (e.g. 1000)" min="1" />
    <button class="generate-btn" onclick="generate()">Generate</button>
  </div>

  <div class="output-wrapper" id="outputWrapper">
    <div class="output-header">
      <span id="outputLabel">Pattern output</span>
      <button class="copy-btn" onclick="copyOutput()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copy
      </button>
    </div>
    <div id="output"></div>
  </div>

  <div class="toast" id="toast">✓ Copied to clipboard!</div>

  <script src="script.js"></script>
</body>
</html>
